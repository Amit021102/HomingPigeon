<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomingPigeon - View Paste</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
</head>
<body>
    <div class="container">
        <div class="meta-header">
            <a href="/" class="back-btn">
                <span>🏠</span>
                <span>New Paste</span>
            </a>
            <span id="metaBadge" class="badge">General</span>
        </div>
        
        <h2 id="displayTitle" style="margin-top: 0; margin-bottom: 5px;">🐦 Loading...</h2>
        <div id="highlightControl" class="highlighted">
            <input type="checkbox" id="toggleHighlight" checked>
            <label for="toggleHighlight" id="highlightLabel">Enable Syntax Highlighting</label>
        </div>
        <div class="warning" id="burnWarning">
            🔥 Warning: This is a Burn-After-Read paste. If you refresh or navigate away, it's gone forever!
        </div>
        
        <pre id="output">Loading content from memory...</pre>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <script type="module">
        const shortId = window.location.pathname.substring(1);
        const highlightToggle = document.getElementById('toggleHighlight');
        const highlightControl = document.getElementById('highlightControl');
        const highlightLabel = document.getElementById('highlightLabel');
        const outputElement = document.getElementById('output');
        
        let rawContentText = ""; 
        let currentTargetSyntax = "plaintext";

        function renderContent() {
            if (currentTargetSyntax === 'plaintext') {
                outputElement.className = 'language-plaintext';
                outputElement.textContent = rawContentText;
                return;
            }

            if (highlightToggle.checked) {
                outputElement.className = `language-${currentTargetSyntax}`;
                outputElement.textContent = rawContentText;
                Prism.highlightElement(outputElement);
            } else {
                outputElement.className = 'language-plaintext';
                outputElement.textContent = rawContentText;
            }
        }

        // Toggle engine handler
        highlightToggle.addEventListener('change', renderContent);

        async function loadPaste() {
            const response = await fetch(`/api/pastes/${shortId}`);
            const outputElement = document.getElementById('output');
            const titleElement = document.getElementById('displayTitle');
            const badgeElement = document.getElementById('metaBadge');
            const warningElement = document.getElementById('burnWarning');

            if (response.ok) {
                const paste = await response.json();
                
                // Mount structural labels dynamically from our memory store snapshot
                titleElement.textContent = paste.title;
                badgeElement.textContent = `Topic: ${paste.category}`;
                outputElement.textContent = paste.content;
                rawContentText = paste.content;
                currentTargetSyntax = paste.syntax || 'plaintext';
                
                // Expose warning flag strictly if property evaluates to true
                if (paste.isBurn) {
                    warningElement.style.display = "block";
                }

                if (currentTargetSyntax === 'plaintext') {
                    highlightControl.style.display = 'none';
                    highlightToggle.checked = false;
                } else {
                    highlightControl.style.display = 'block';
                    highlightLabel.textContent = `${currentTargetSyntax} highlighting`;
                    highlightToggle.checked = true;
                }

                // Initial render execution (toggled on by default configuration)
                renderContent();
            } else {
                titleElement.textContent = "Error";
                outputElement.textContent = "❌ 404 - This pigeon carried no message! (Paste Not Found or Expired)";
                outputElement.style.color = "#dc3545";
                badgeElement.style.display = "none";
                highlightControl.style.display = "none";
            }
        }

        loadPaste();
    </script>
</body>
</html>
